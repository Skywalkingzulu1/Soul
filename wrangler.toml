# Andile Cloudflare Worker Configuration

name = "andile-soul-2026"
main = "cloudflare_worker.js"
compatibility_date = "2024-01-01"

[observability]
enabled = true

# Environment variables  
[vars]
ANDILE_NAME = "Andile Sizophila Mchunu"
ANDILE_MONIKER = "Skywalkingzulu"
ANDILE_LOCATION = "cloudflare"

# Persistent Memory (Always Free Tier)
kv_namespaces = [
  { binding = "SOUL_MEMORY", id = "andile_memory_kv" }
]

# 24/7 Autonomy: Run every hour to check repos/bounties
[triggers]
crons = ["0 * * * *"]

# Workers.dev subdomain
workers_dev = true
