name: "Sentinel 24/7 Autonomy"

on:
  schedule:
    - cron: '0 * * * *'  # Run EVERY HOUR for 24/7 pulse
  workflow_dispatch:      # Allow manual trigger

jobs:
  soul-mission:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # Add any specialized tools
          pip install ruff

      - name: Run Sentinel Cycle
        env:
          GITHUB_TOKEN: ${{ secrets.ANDILE_GITHUB_TOKEN }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          OLLAMA_HOST: ${{ secrets.OLLAMA_HOST }}
        run: |
          # Start a single autonomous cycle
          python -c "from soul.agentic.sentinel import Sentinel; import asyncio; from soul.brain import Soul; soul=Soul(); sentinel=Sentinel(soul); asyncio.run(sentinel.autonomous_cycle())"
